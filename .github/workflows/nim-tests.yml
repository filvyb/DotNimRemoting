name: Unit tests

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        nim-version: ['2.0.16', '2.2.10']
        arch: [x64, arm64]
        exclude:
          # GitHub doesn't provide Windows ARM runners yet
          - os: windows-latest
            arch: arm64
      fail-fast: false
    
    runs-on: >-
      ${{ (matrix.os == 'macos-latest' && matrix.arch == 'arm64') && 'macos-15-intel'
       || (matrix.os == 'ubuntu-latest' && matrix.arch == 'arm64') && 'ubuntu-24.04-arm'
       || matrix.os }}

    steps:
    - uses: actions/checkout@v7

    # setup-nim-action supports x64 and arm64 on all platforms
    - name: Install Nim
      uses: jiro4989/setup-nim-action@v2.3.0
      with:
        nim-version: ${{ matrix.nim-version }}

    - name: Install dependencies
      run: |
        nimble install -y
        nimble refresh
        
    - name: Run tests
      run: nimble test -y
        
    - name: Cache nimble packages
      uses: actions/cache@v5
      with:
        path: |
          ~/.nimble
          ${{ github.workspace }}/nimcache
          ${{ env.APPDATA }}/nimble  # Windows-specific
          ~/Library/Nimble           # macOS-specific
        key: ${{ runner.os }}-${{ matrix.arch }}-nim-${{ matrix.nim-version }}-v1
        restore-keys: |
          ${{ runner.os }}-${{ matrix.arch }}-nim-${{ matrix.nim-version }}-
          ${{ runner.os }}-${{ matrix.arch }}-nim-
