name: Integration Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver: docker

    - name: Build Docker Image
      run: |
        docker build -t dotnet-nim-test -f tests/Dockerfile .

    - name: Run Tests (Nim client -> .NET server)
      run: >
        docker run --rm dotnet-nim-test powershell -File C:\app\tests\run-interop-test.ps1
        -ServerExe 'C:\app\tests\dotnet\Server\bin\Release\Server.exe'
        -Port 8080
        -ClientExe 'C:\app\tests\nim\client.exe'
        -ServerKeepStdin

    - name: Run Reverse Tests (.NET client -> Nim server)
      run: >
        docker run --rm dotnet-nim-test powershell -File C:\app\tests\run-interop-test.ps1
        -ServerExe 'C:\app\tests\nim\server.exe'
        -Port 8081
        -ClientExe 'C:\app\tests\dotnet\Client\bin\Release\Client.exe'
        -ClientArgs 'tcp://127.0.0.1:8081/EchoService'
